name: Go check lint and build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26.x'

    - name: Lint
      uses: golangci/golangci-lint-action@v9.2.0
      with:
        version: latest

    - name: Test
      run: go test -v -race ./...

    - name: Build
      run: go build -v -o bin/ ./...
